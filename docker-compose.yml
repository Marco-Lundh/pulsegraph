# Local-first infrastructure for PulseGraph (ADR 0017).
# `docker compose up -d` starts PostgreSQL (with pgvector) and Redis.
# The application, scheduler, and workers run on the host.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pulsegraph
      POSTGRES_PASSWORD: pulsegraph
      POSTGRES_DB: pulsegraph
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsegraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
